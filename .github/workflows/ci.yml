name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/module.js || { echo "module.js missing"; exit 1; }
          test -f dist/plugin.json || { echo "plugin.json missing"; exit 1; }
          test -f dist/README.md || { echo "README.md missing"; exit 1; }
          echo "dist/ OK"
          ls -lh dist/
