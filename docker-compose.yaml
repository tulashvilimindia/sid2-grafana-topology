services:
  grafana:
    user: root
    container_name: mtulashvili-sre-topology-panel-dev
    build:
      context: ./.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.0.0}
    ports:
      - 13100:3000/tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/mtulashvili-sre-topology-panel
      - ./provisioning:/etc/grafana/provisioning
    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.mtulashvili-sre-topology-panel:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: mtulashvili-sre-topology-panel
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # AWS credentials passthrough for the provisioned CloudWatch
      # datasource (provisioning/datasources/datasource.yml). Read from
      # host shell or a .env file in this directory. Leave unset for
      # local-only dev without real AWS credentials.
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Infinity datasource (Production Grafana API) + Prometheus proxy
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_API_TOKEN: ${GRAFANA_API_TOKEN:-}
      NR_API_KEY: ${NR_API_KEY:-}
